# ─────────────────────────────────────────────────────────────────
# Generated by Saber v0.1.0 on 2026-06-05 for flutter
#
#   Languages:    java, javascript/typescript, python, swift, c/c++
#   Build:        (no build system detected at repo root)
#   Namespace:    endor-solutions-ypulse.github-ci.saber-e2e
#   Auth:         GitHub OIDC (keyless)
#   PR behavior:  comment on PR (non-blocking)
#   PR scan mode: quick
#
# Regenerate this file with `saber scan repo` (point at this repo's path).
# Hand-edits will be overwritten on the next regeneration.
# ─────────────────────────────────────────────────────────────────
#
# Saber split one or more scan units to fit standard runner memory:
#   • java: 4 shards (dev, examples, engine, packages)
#     Saber split the java scan into multiple jobs because this repo has 32
#     java root manifests — a single full-reachability scan exceeds the
#     ubuntu-latest runner memory budget. Each shard scans one top-level
#     subtree with full reachability preserved.
#
name: Endor Labs Scan
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
jobs:
  detect-changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: read
    outputs:
      java-dev: ${{ steps.filter.outputs.java-dev }}
      java-examples: ${{ steps.filter.outputs.java-examples }}
      java-engine: ${{ steps.filter.outputs.java-engine }}
      java-packages: ${{ steps.filter.outputs.java-packages }}
      javascript-typescript: ${{ steps.filter.outputs.javascript-typescript }}
      python: ${{ steps.filter.outputs.python }}
      swift: ${{ steps.filter.outputs.swift }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |-
            java-dev:
              - dev/**/'**/pom.xml'
              - dev/**/'**/build.gradle'
              - dev/**/'**/build.gradle.kts'
              - dev/**/'**/*.java'
            java-examples:
              - examples/**/'**/pom.xml'
              - examples/**/'**/build.gradle'
              - examples/**/'**/build.gradle.kts'
              - examples/**/'**/*.java'
            java-engine:
              - engine/**/'**/pom.xml'
              - engine/**/'**/build.gradle'
              - engine/**/'**/build.gradle.kts'
              - engine/**/'**/*.java'
            java-packages:
              - packages/**/'**/pom.xml'
              - packages/**/'**/build.gradle'
              - packages/**/'**/build.gradle.kts'
              - packages/**/'**/*.java'
            javascript-typescript:
              - '**/package.json'
              - '**/package-lock.json'
              - '**/yarn.lock'
              - '**/pnpm-lock.yaml'
              - '**/rush.json'
              - '**/*.js'
              - '**/*.ts'
              - '**/*.tsx'
            python:
              - '**/requirements.txt'
              - '**/pyproject.toml'
              - '**/poetry.lock'
              - '**/setup.py'
              - '**/setup.cfg'
              - '**/Pipfile'
              - '**/Pipfile.lock'
              - '**/pdm.lock'
              - '**/uv.lock'
              - '**/*.py'
            swift:
              - '**/Package.swift'
              - '**/Package@swift-*.swift'
              - '**/Podfile'
              - '**/*.swift'
  scan-java-dev-pr:
    name: "PR Scan: java (dev)"
    needs: detect-changes
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.java-dev == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      id-token: write
      security-events: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: endorlabs/github-action@b8992820cc4d9c9e7ded5022adf6cabe2dc11946
        with:
          namespace: "endor-solutions-ypulse.github-ci.saber-e2e"
          scan_dependencies: true
          pr: true
          enable_pr_comments: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          enable_github_action_token: true
          additional_args: "--languages=java --include-path=dev/** --exclude-path=dev/integration_tests/** --exclude-path=dev/manual_tests/** --exclude-path=dev/tracing_tests/** --exclude-path=packages/integration_test/** --quick-scan"
  scan-java-dev-monitor:
    name: "Monitor Scan: java (dev)"
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
